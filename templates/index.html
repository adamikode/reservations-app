<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Időpont Foglalás</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); display: inline-block; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Időpont Foglalási Rendszer</h2>
    <p>Kérjük, add meg a neved és válaszd ki a dátumot!</p>
    
    <form action="/foglal" method="POST">
        <input type="text" name="nev" placeholder="Teljes neved" required>
        <input type="date" name="datum" required>
        <button type="submit">Időpont lefoglalása</button>
    </form>
</div>

</body>
</html>
