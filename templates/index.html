<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időpont Foglalás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .booking-card { max-width: 500px; margin: 80px auto; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container">
        <div class="card booking-card p-4 rounded-4">
            <h2 class="text-center mb-4 fw-bold text-primary">Időpont Foglalás</h2>
<form action="/foglal" method="POST">
    <label for="nev">Neved:</label>
    <input type="text" id="nev" name="nev" required><br><br>

    <label for="szolgaltatas">Válassz szolgáltatást:</label>
    <select id="szolgaltatas" name="szolgaltatas" required>
        <option value="" disabled selected>-- Válassz egyet --</option>
        {% for sz in szolgaltatasok %}
            <option value="{{ sz[0] }}">{{ sz[1] }} ({{ sz[2] }}€ - {{ sz[3] }})</option>
        {% endfor %}
    </select><br><br>

    <label for="idopont">Válassz szabad időpontot:</label>
    <select id="idopont" name="idopont" required>
        <option value="" disabled selected>-- Válassz időpontot --</option>
        {% for idopont in szabad_idopontok %}
            <option value="{{ idopont[0] }}">{{ idopont[1] }}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Foglalás elküldése</button>
</form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/hu.js"></script>
    <script>
        flatpickr("#datum", {
            enableTime: true,        // BEKAPCSOLJA AZ ÓRÁT ÉS PERCET IS!
            dateFormat: "Y-m-d H:i", // Év-Hónap-Nap Óra:Perc formátum
            time_24hr: true,         // 24 órás kijelzés
            locale: "hu"             // Magyar nyelv
        });
    </script>

</body>
</html>
